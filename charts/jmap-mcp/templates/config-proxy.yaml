{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jmap-mcp.fullname" . }}-proxy
  labels:
    {{- include "jmap-mcp.labels" . | nindent 4 }}
data:
  traefik.yaml: |
    entryPoints:
      web:
        address: ":{{ .Values.proxy.port }}"
        # Trust X-Forwarded-* from the upstream ingress/gateway so the
        # backend can derive the external base URL for signed attachment
        # links. If the edge forwards client-supplied X-Forwarded-Host
        # unfiltered, a header injector could point generated links at
        # their own host; set jmap.attachmentURL.externalURL to pin the
        # base URL instead of deriving it.
        forwardedHeaders:
          insecure: true

    log:
      level: INFO

    accessLog:
      format: json

    ping:
      entryPoint: web

    providers:
      file:
        filename: /etc/traefik/traefik.yaml

    http:
      routers:
        # Signed attachment downloads: the URL path is a sealed capability
        # embedding the JMAP token, so it must never reach access logs, and
        # the link must be fetchable without basic auth (the signature is
        # the sole access control).
        attachments:
          rule: "PathPrefix(`/attachments/`)"
          service: mcp-backend
          observability:
            accessLogs: false
        mcp:
          rule: "PathPrefix(`/`)"
          service: mcp-backend
          {{- if .Values.proxy.auth.enabled }}
          middlewares:
            - basic-auth
          {{- end }}

      {{- if .Values.proxy.auth.enabled }}
      middlewares:
        basic-auth:
          basicAuth:
            usersFile: "/etc/traefik/users"
      {{- end }}

      services:
        mcp-backend:
          loadBalancer:
            servers:
              - url: "http://127.0.0.1:{{ .Values.server.port }}"
{{- end }}
