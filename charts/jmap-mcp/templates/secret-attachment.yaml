{{- if not .Values.jmap.attachmentURL.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jmap-mcp.fullname" . }}-attachment
  labels:
    {{- include "jmap-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  secret: {{ include "jmap-mcp.attachmentSecretValue" . }}
{{- end }}
